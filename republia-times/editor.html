<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Republia Times — Article Editor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg: #1a1a2e;
        --bg-panel: #16213e;
        --bg-input: #0f3460;
        --bg-row-hover: #1a3a5c;
        --bg-row-selected: #1f4068;
        --text: #e0e0e0;
        --text-muted: #8892a0;
        --accent: #e94560;
        --border: #2a2a4a;
        --green: #16a34a;
        --red: #dc2626;
        --yellow: #d97706;

        --cat-plot: #8b0000;
        --cat-military: #2e4057;
        --cat-war: #d4380d;
        --cat-politics: #531dab;
        --cat-weather: #0891b2;
        --cat-sports: #16a34a;
        --cat-entertainment: #d97706;
      }
      body {
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 13px;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
      }
      #editor-root {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .toolbar input[type="text"] {
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 8px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 13px;
        width: 200px;
      }
      .toolbar select {
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 8px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 13px;
      }
      .toolbar button {
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 12px;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
      }
      .toolbar button:hover { background: var(--bg-row-hover); }
      .toolbar button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .toolbar button.primary:hover { opacity: 0.9; }
      .toolbar .spacer { flex: 1; }
      .toolbar .status { color: var(--text-muted); font-size: 12px; }
      .toolbar .dirty { color: var(--yellow); font-size: 12px; }

      /* Main layout */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Article list */
      .list-panel {
        width: 55%;
        overflow-y: auto;
        border-right: 1px solid var(--border);
      }
      .list-table {
        width: 100%;
        border-collapse: collapse;
      }
      .list-table th {
        position: sticky;
        top: 0;
        background: var(--bg-panel);
        padding: 6px 8px;
        text-align: left;
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
      }
      .list-table td {
        padding: 5px 8px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 300px;
        cursor: pointer;
      }
      .list-table tr:hover td { background: var(--bg-row-hover); }
      .list-table tr.selected td { background: var(--bg-row-selected); }
      .cat-badge {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 11px;
        color: #fff;
        font-weight: 600;
      }
      .loyalty-up { color: var(--green); }
      .loyalty-down { color: var(--red); }
      .loyalty-none { color: var(--text-muted); }

      /* Form panel */
      .form-panel {
        width: 45%;
        overflow-y: auto;
        padding: 12px 16px;
      }
      .form-panel h3 {
        margin: 16px 0 8px;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
      }
      .form-panel h3:first-child { margin-top: 0; }
      .form-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .form-row label {
        width: 100px;
        flex-shrink: 0;
        font-size: 12px;
        color: var(--text-muted);
        text-align: right;
      }
      .form-row input[type="text"],
      .form-row input[type="number"],
      .form-row select {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 8px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 13px;
      }
      .form-row textarea {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 8px;
        border-radius: 3px;
        font-family: inherit;
        font-size: 13px;
        resize: vertical;
        min-height: 60px;
      }
      .form-row input[type="checkbox"] { margin: 0; }
      .form-row .radio-group { display: flex; gap: 12px; }
      .form-row .radio-group label { width: auto; }
      .form-row .readonly {
        color: var(--text-muted);
        font-style: italic;
      }
      .null-toggle {
        font-size: 11px;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
      }
      .null-toggle:hover { color: var(--text); }
      .validation-msg {
        font-size: 11px;
        padding: 2px 0 2px 108px;
      }
      .validation-msg.error { color: var(--red); }
      .validation-msg.warning { color: var(--yellow); }
      .empty-state {
        color: var(--text-muted);
        text-align: center;
        padding: 40px;
        font-style: italic;
      }
      .delete-section {
        margin-top: 24px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .delete-btn {
        background: transparent;
        border: 1px solid var(--red);
        color: var(--red);
        padding: 4px 12px;
        border-radius: 3px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
      }
      .delete-btn:hover { background: var(--red); color: #fff; }
    </style>
  </head>
  <body>
    <div id="editor-root"></div>
    <script type="module" src="/src/editor/EditorApp.ts"></script>
  </body>
</html>
